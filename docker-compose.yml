services:
  presentation:
    build: .
    image: websockets-visible:latest
    container_name: websockets-visible-presentation
    entrypoint: ["/usr/local/bin/app-entrypoint"]
    command: php server.php
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "0.0.0.0:8989:8989"
    volumes:
      - ./:/app
    environment:
      COMPOSER_BOOTSTRAP: "1"
    restart: unless-stopped
