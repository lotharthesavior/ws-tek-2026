<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Channel Broadcast — Live Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/channel.css" />
  </head>
  <body>
    <h1>Channel Broadcast</h1>
    <p class="subtitle">
      Open this page in two tabs — messages sent in one appear in both instantly
      via Socket Conveyor's channel routing
    </p>
    <div id="status" class="status connecting">Connecting…</div>

    <div class="chat">
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input
          id="input"
          type="text"
          placeholder="Type a message and press Enter…"
          disabled
        />
        <button id="send" disabled>Broadcast</button>
      </div>
    </div>

    <div class="hint">
      Subprotocol: <code>socketconveyor.com</code> &nbsp;·&nbsp; Flow:
      <code>channel-connect → "demo-channel"</code> then
      <code>broadcast-action</code> pushes to every fd subscribed to that
      channel.
    </div>

    <script>
      const WS_URL = "ws://localhost:8989";
      const CHANNEL = "demo-channel";

      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const statusEl = document.getElementById("status");

      let ws = null;

      function addMsg(text, type) {
        const el = document.createElement("div");
        el.className = "msg " + type;
        el.textContent = text;
        messagesEl.appendChild(el);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setStatus(label, cls) {
        statusEl.textContent = label;
        statusEl.className = "status " + cls;
      }

      function joinChannel() {
        ws.send(
          JSON.stringify({ action: "channel-connect", channel: CHANNEL }),
        );
        setStatus("Joined: " + CHANNEL, "joined");
        inputEl.disabled = false;
        sendBtn.disabled = false;
        addMsg('Joined channel "' + CHANNEL + '"', "system");
      }

      function connect() {
        setStatus("Connecting…", "connecting");
        ws = new WebSocket(WS_URL, ["socketconveyor.com"]);

        ws.onopen = () => {
          setStatus("Connected — joining channel…", "connected");
          addMsg(
            "Connected to server (protocol: " + (ws.protocol || "none") + ")",
            "system",
          );
          // Small delay so connection-info message arrives first
          setTimeout(joinChannel, 150);
        };

        ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.action === "connection-info") return; // handshake only
            const payload = msg.data ?? e.data;
            addMsg("← " + payload, "received");
          } catch {
            addMsg("← " + e.data, "received");
          }
        };

        ws.onclose = () => {
          setStatus("Disconnected — reconnecting in 3s…", "disconnected");
          inputEl.disabled = true;
          sendBtn.disabled = true;
          addMsg("Disconnected", "system");
          setTimeout(connect, 3000);
        };

        ws.onerror = () => {
          addMsg("Connection error", "system");
        };
      }

      function send() {
        const text = inputEl.value.trim();
        if (!text || ws?.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ action: "broadcast-action", data: text }));
        addMsg("→ " + text, "sent");
        inputEl.value = "";
      }

      sendBtn.addEventListener("click", send);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") send();
      });

      connect();
    </script>
  </body>
</html>
